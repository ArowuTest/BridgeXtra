name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: devlocal
          POSTGRES_DB: telco_credit
        ports: ["5434:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Build all packages
        run: go build ./...

      - name: Fresh-DB migration check (from-zero lesson)
        env:
          TCP_ADMIN_DSN: postgres://postgres:devlocal@localhost:5434/telco_credit
        run: go run ./backend/cmd/migrate

      # V2-TST-016 wiring starts here: merge is blocked when this job fails.
      # Includes the SF-3 tenant-isolation negative pack, which provisions its
      # own fresh databases per test package.
      - name: OpenAPI spec validation (V2-API-001)
        run: go test -count=1 ./api/...

      - name: Race-enabled test suite
        env:
          CI: "true"
          TCP_TEST_HOSTPORT: localhost:5434
        run: go test -race -count=1 ./backend/... ./simulator/...

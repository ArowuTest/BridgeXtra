# CI is the quality floor (BC-2, ENGINEERING_STANDARD): every job here is
# merge-blocking. V2-TST-016: production deployment is blocked when release-
# gating checks are missing or red.
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    # Static quality floor — no database needed, fails fast.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: gofmt clean (BC-2)
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then echo "gofmt needed:"; echo "$out"; exit 1; fi

      - name: go mod verify + tidy diff-clean (BC-2 supply chain)
        run: |
          go mod verify
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: No floats in the money or scoring path (BC-1 guard)
        run: |
          if grep -rEn 'float(32|64)' backend/internal/entity backend/internal/ledger backend/internal/scoring 2>/dev/null; then
            echo "float in money/scoring path — forbidden by ADR-0002 / BC-1"; exit 1
          fi
          echo "money and scoring paths float-free"

      - name: golangci-lint (BC-2 — zero warnings)
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest

      - name: govulncheck (BC-2 — Go vulnerability DB)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: gosec (BC-2 — security static analysis)
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec -quiet -exclude-generated ./...

      - name: Vet
        run: go vet ./...

      - name: Build all packages
        run: go build ./...

      - name: OpenAPI spec validation (V2-API-001)
        run: go test -count=1 ./api/...

  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: devlocal
          POSTGRES_DB: telco_credit
        ports: ["5434:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Fresh-DB migration check (from-zero lesson)
        env:
          TCP_ADMIN_DSN: postgres://postgres:devlocal@localhost:5434/telco_credit
        run: go run ./backend/cmd/migrate

      # V2-TST-016: merge is blocked when this job fails. Includes the SF-3
      # tenant-isolation negative pack (fresh databases per test package) and
      # the G0-F2 reviewer reproducer.
      #
      # -p 2 bounds package-level parallelism: the DB-heavy packages share ONE
      # Postgres, and the default (GOMAXPROCS) run starved it enough that a
      # package could hit the 10-min timeout under load (a non-deterministic
      # FAIL that looked like a coverage dip because a timed-out package's
      # coverage was lost). -race reports fire regardless of -p, so bounding
      # parallelism removes the starvation without masking any real race. The
      # reviewer confirmed 22/22 packages green, exit 0, under -p 2.
      - name: Race-enabled test suite with coverage
        env:
          CI: "true"
          TCP_TEST_HOSTPORT: localhost:5434
        run: >
          go test -race -count=1 -p 2
          -coverprofile=coverage.out
          -coverpkg=./backend/internal/...
          ./backend/... ./simulator/...

      - name: Coverage floor 70% on backend/internal (BC-2 — ratchets up, never down)
        run: |
          total=$(go tool cover -func=coverage.out | tail -1 | awk '{gsub("%","",$3); print $3}')
          echo "total coverage: ${total}%"
          awk -v t="$total" 'BEGIN { if (t+0 < 70.0) { print "coverage " t "% below floor 70%"; exit 1 } }'

      # Serial by design: reshapes cluster-global roles to prove the managed-
      # Postgres deployment path (non-superuser owner, BYPASSRLS fallback,
      # env password rotation). Runs AFTER the parallel suite so it cannot
      # race other packages' role authentication.
      - name: Managed-owner migration path (Render class, serial)
        env:
          TCP_TEST_HOSTPORT: localhost:5434
          TCP_TEST_MANAGED_OWNER: "1"
        run: go test -count=1 -run TestApply_AsManagedNonSuperuserOwner ./backend/internal/platform/dbmigrate/

  # Gate B #3: the operator portal is now merge-blocking too — a red typecheck,
  # lint, build, or a missing/weakened browser security header fails the PR
  # (VR-56-F1: the CSP is the console's XSS defence for the CSRF-token session).
  portal:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: portal
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: portal/package-lock.json

      - name: Install (locked)
        run: npm ci

      - name: Typecheck (tsc --noEmit)
        run: npm run typecheck

      - name: Lint (next lint — zero warnings)
        run: npm run lint

      - name: Build
        run: npm run build

      # Prove the security headers are actually SERVED (not just declared), that
      # the CSP is the strict nonce form (NOT weakened 'unsafe-inline'), and
      # (VR-62-F1) that the app actually LOADS under its own CSP: every same-origin
      # script in the served HTML must carry THIS request's nonce. A static-
      # prerender regression (e.g. dropping `await headers()` from layout.tsx, or a
      # Next upgrade changing prerender behaviour) ships nonce-less scripts that
      # strict-dynamic then blocks (white screen) while the header stays strict —
      # this is the check that catches that, not the header assertion.
      - name: Security headers + strict CSP + app loads under its own CSP
        run: |
          npm run start >/tmp/portal.log 2>&1 &
          for i in $(seq 1 30); do
            curl -sf -o /dev/null "http://localhost:3090/login" && break || sleep 1
          done
          # One request: headers AND body share the same per-request nonce.
          body=$(curl -sD /tmp/hdr.txt "http://localhost:3090/login")
          h=$(cat /tmp/hdr.txt)
          echo "$h"
          fail=0
          req() { echo "$h" | grep -iq "$1" || { echo "MISSING header: $1"; fail=1; }; }
          req "^content-security-policy:"
          req "^strict-transport-security: *max-age=63072000"
          req "^x-frame-options: *DENY"
          req "^x-content-type-options: *nosniff"
          req "^referrer-policy: *no-referrer"
          req "^permissions-policy:"
          csp=$(echo "$h" | grep -i "^content-security-policy:")
          nonce=$(echo "$csp" | grep -oE "nonce-[A-Za-z0-9+/=]+" | head -1 | sed "s/nonce-//")
          [ -n "$nonce" ] || { echo "CSP is not nonce-based"; fail=1; }
          if echo "$csp" | grep -oiE "script-src[^;]*" | grep -q "unsafe-inline"; then
            echo "CSP script-src permits unsafe-inline — XSS defence defeated"; fail=1
          fi
          # VR-62-F1: the app-loads-under-CSP regression guard.
          nonced=$(echo "$body" | grep -oE "<script[^>]*nonce=\"${nonce}\"" | wc -l)
          scripts=$(echo "$body" | grep -oE "<script( [^>]*)?>" | wc -l)
          unnonced=$(echo "$body" | grep -oE "<script( [^>]*)?>" | grep -cv "nonce=" || true)
          echo "scripts total=${scripts} nonced=${nonced} un-nonced=${unnonced}"
          [ "$nonced" -ge 1 ] || { echo "NO script carries the request nonce — CSP would block the app (white screen)"; fail=1; }
          [ "$unnonced" -eq 0 ] || { echo "${unnonced} same-origin scripts lack the nonce — strict-dynamic would block them"; fail=1; }
          exit $fail

# Platform API — OpenAPI 3.0 specification (V2-API-001).
# RULE: every endpoint change updates this file IN THE SAME COMMIT; CI validates
# the spec and fails the build on parse/validation errors (api/apispec_test.go).
# Version tracks milestones: 0.<milestone>.<increment>.
openapi: 3.0.3
info:
  title: Telco Digital Credit Platform API
  description: |
    Platform-facing API. Tenant context is resolved from the authenticated
    credential (V2-TEN-002), never from caller-supplied fields; a conflicting
    `X-Telco-Id` claim is rejected 403 and security-audited (V2-TEN-003, EDG-026).

    Conventions (binding, V2-API-002..011):
    - Monetary values are integer **minor units** plus ISO 4217 currency; never floats.
    - Mutating commands require an `Idempotency-Key`; a valid retry returns the
      original outcome (V2-API-003).
    - Timestamps are UTC RFC 3339.
    - Errors use the standard envelope with stable `error_code` families
      (AUTH_*, TENANT_*, OFFER_*, ADVANCE_*, FULFILMENT_*, FUNDING_*, RATE_*, SYSTEM_*).
  version: 0.4.2  # M4c — portal risk workspace (guardrail trips + two-person re-arm)
servers:
  - url: http://localhost:8090
    description: Local development (A-14)

security:
  - ApiKeyAuth: []

paths:
  /v1/portal/login:
    post:
      operationId: portalLogin
      summary: Portal sign-in (M4a) — sets the httpOnly session cookie
      description: >
        Authenticates an operator credential and establishes a server-side
        session: httpOnly SameSite=Strict cookie plus a per-session CSRF
        token the client must echo in X-CSRF-Token on every mutating call.
        Invalid, expired and revoked credentials are indistinguishable.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [api_key]
              properties:
                api_key: { type: string }
      responses:
        "200":
          description: Session established (cookie set)
          content:
            application/json:
              schema:
                type: object
                required: [actor, role, csrf_token, expires_at]
                properties:
                  actor: { type: string }
                  role: { type: string, enum: [ADMIN, RISK, FINANCE, OPS, SUPPORT] }
                  csrf_token: { type: string }
                  expires_at: { type: string, format: date-time }
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
  /v1/portal/logout:
    post:
      operationId: portalLogout
      summary: Revoke the current portal session
      responses:
        "200":
          description: Signed out (cookie cleared, session revoked)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
        "401":
          description: No live session
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
  /v1/portal/me:
    get:
      operationId: portalMe
      summary: Current operator identity + role (all roles)
      responses:
        "200":
          description: Session identity
          content:
            application/json:
              schema:
                type: object
                properties:
                  actor: { type: string }
                  role: { type: string }
                  expires_at: { type: string, format: date-time }
        "401":
          description: No live session
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
  /v1/portal/config/active:
    get:
      operationId: portalConfigActive
      summary: Read the ACTIVE config version (roles ADMIN, RISK, FINANCE)
      parameters:
        - { name: domain, in: query, required: true, schema: { type: string } }
        - { name: scope, in: query, required: true, schema: { type: string } }
      responses:
        "200":
          description: The active version
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ConfigVersion" }
        "403":
          description: Role not permitted (deny-by-default RBAC)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
  /v1/portal/config/overview:
    get:
      operationId: portalConfigOverview
      summary: Per-(domain,scope) governance summary (roles ADMIN, RISK, FINANCE)
      responses:
        "200":
          description: One row per (domain, scope) with active version and pending pipeline count
          content:
            application/json:
              schema:
                type: object
                required: [domains]
                properties:
                  domains:
                    type: array
                    items: { $ref: "#/components/schemas/ConfigSummary" }
        "403":
          description: Role not permitted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
  /v1/portal/config/versions:
    get:
      operationId: portalConfigVersions
      summary: List config versions newest-first (roles ADMIN, RISK, FINANCE)
      parameters:
        - { name: domain, in: query, required: false, schema: { type: string } }
        - { name: scope, in: query, required: false, schema: { type: string } }
        - { name: limit, in: query, required: false, schema: { type: integer, minimum: 1, maximum: 200 } }
      responses:
        "200":
          description: Versions (limit clamped server-side)
          content:
            application/json:
              schema:
                type: object
                required: [versions]
                properties:
                  versions:
                    type: array
                    items: { $ref: "#/components/schemas/ConfigVersion" }
        "403":
          description: Role not permitted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
  /v1/portal/config/{id}:
    get:
      operationId: portalConfigGet
      summary: Read one config version in any lifecycle state (roles ADMIN, RISK, FINANCE)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: The version
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ConfigVersion" }
        "404":
          description: Unknown version id
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
  /v1/portal/config/drafts:
    post:
      operationId: portalConfigDraft
      summary: Create a config draft (role ADMIN; actor = session identity)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [domain, scope, reason, content]
              properties:
                domain: { type: string }
                scope: { type: string }
                reason: { type: string }
                content: { type: object }
      responses:
        "201":
          description: Draft created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ConfigVersion" }
        "403":
          description: Role not permitted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
  /v1/portal/config/{id}/submit:
    post:
      operationId: portalConfigSubmit
      summary: Submit a draft (role ADMIN)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Submitted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LifecycleAck" }
  /v1/portal/config/{id}/approve:
    post:
      operationId: portalConfigApprove
      summary: Approve a submission (role ADMIN; maker-checker enforced server-side)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Approved
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LifecycleAck" }
        "409":
          description: Maker-checker violation (approver == maker)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
  /v1/portal/config/{id}/activate:
    post:
      operationId: portalConfigActivate
      summary: Activate an approved version (role ADMIN)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Activated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LifecycleAck" }
  /v1/portal/risk/trips:
    get:
      operationId: portalRiskTrips
      summary: List open guardrail trips in the operator's scope (roles ADMIN, RISK, FINANCE)
      description: >
        Trips still holding a programme (state != REARMED), bounded to the
        operator's telco/programme scope. A platform admin ('*') sees all; a
        'global'-only operator sees none.
      responses:
        "200":
          description: Open trips
          content:
            application/json:
              schema:
                type: object
                required: [trips]
                properties:
                  trips:
                    type: array
                    items: { $ref: "#/components/schemas/GuardrailTrip" }
        "403":
          description: Role not permitted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
  /v1/portal/risk/trips/{id}/request-rearm:
    post:
      operationId: portalRiskRequestRearm
      summary: Request re-arm of a tripped guardrail (maker step; roles ADMIN, RISK)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason: { type: string }
      responses:
        "200":
          description: Re-arm requested
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RearmAck" }
        "404":
          description: Trip not found, out of scope, or not in the required state (no oracle)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
  /v1/portal/risk/trips/{id}/approve-rearm:
    post:
      operationId: portalRiskApproveRearm
      summary: Approve a re-arm (checker step, distinct actor schema-enforced; roles ADMIN, RISK)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Re-armed; programme resumes when no other guardrail holds it
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RearmAck" }
        "409":
          description: Two-person violation (approver == requester)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "404":
          description: Trip not found, out of scope, or not in the required state (no oracle)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
  /healthz:
    get:
      operationId: getHealth
      summary: Liveness/readiness probe (V2-SRV-008)
      security: []  # unauthenticated by design
      responses:
        "200":
          description: Service healthy
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    enum: [ok]
        "503":
          $ref: "#/components/responses/Unavailable"

  /v1/programmes:
    get:
      operationId: listProgrammes
      summary: List the authenticated tenant's programmes
      description: >
        Tenant-scoped via RLS: returns only rows belonging to the telco the
        credential resolves to. Missing tenant context returns nothing, never
        all tenants (fail closed).
      parameters:
        - $ref: "#/components/parameters/TelcoIdClaim"
      responses:
        "200":
          description: Programmes for the authenticated tenant
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Programme"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/TenantMismatch"
        "500":
          $ref: "#/components/responses/Unavailable"

  /v1/offers:
    get:
      operationId: listOffers
      summary: Current valid offers for a subscriber (V2-OFR-009 reuse)
      description: >
        Every value derives from governed product config + the pinned decision
        snapshot. Generation is serialized per subscriber/programme — repeated
        or concurrent enquiries return the same ladder.
      parameters:
        - { name: programme_id, in: query, required: true, schema: { type: string } }
        - { name: msisdn_token, in: query, required: true, schema: { type: string } }
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: Offer ladder (may be empty when nothing is offerable)
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Offer" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404":
          description: Unknown subscriber token (OFFER_NOT_FOUND)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /v1/advances:
    post:
      operationId: confirmAdvance
      summary: Confirm an offer — the origination saga (V2 §13)
      description: >
        Requires Idempotency-Key (V2-API-002): a retry with the same key
        returns the ORIGINAL outcome (200), never a second advance. 201 =
        credited (ACTIVE). 202 = PROCESSING — the outcome is being resolved
        (never blind-retried); poll status_route (EDG-004/005). 422 = telco
        definitively rejected. Customer-safe statuses only (V2-ADV-016).
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [programme_id, offer_id, msisdn_token]
              properties:
                programme_id: { type: string }
                offer_id: { type: string }
                msisdn_token: { type: string }
      responses:
        "201":
          description: Advance ACTIVE — value credited
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Advance" }
        "200":
          description: Idempotent replay of the original outcome (EDG-001)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Advance" }
        "202":
          description: PROCESSING — resolution in progress, poll status_route
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Advance" }
        "400":
          description: Missing/invalid Idempotency-Key or malformed body
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403":
          description: Subscriber not eligible (SUBSCRIBER_INACTIVE)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          description: Offer not found (OFFER_NOT_FOUND)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "409":
          description: >
            OFFER_EXPIRED | OFFER_SNAPSHOT_MISMATCH |
            CONCURRENT_ADVANCE_BLOCK | FUNDING_POOL_EXHAUSTED
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "422":
          description: Telco definitively rejected fulfilment (status FAILED)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Advance" }

  /v1/advances/{id}:
    get:
      operationId: getAdvanceStatus
      summary: Durable advance status (EDG-004 — survives dropped sessions)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: Customer-safe advance status
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Advance" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404":
          description: Unknown advance (ADVANCE_NOT_FOUND; tenant-scoped visibility)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /v1/recovery/events:
    post:
      operationId: ingestRecoveryEvent
      summary: Canonical recharge-recovery event (V2-COL-001, EDG-018/020)
      description: >
        Idempotent by source_event_id — a telco replay returns the original
        outcome and changes nothing. Allocation follows the governed waterfall;
        over-recovery quarantines to suspense as an explicit liability;
        unmatched tokens are preserved, never discarded.
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [source_event_id, msisdn_token, amount, occurred_at]
              properties:
                source_event_id: { type: string }
                msisdn_token: { type: string }
                amount: { $ref: "#/components/schemas/Money" }
                occurred_at: { type: string, format: date-time }
      responses:
        "200":
          description: Event outcome (allocated / quarantined / unmatched / replayed)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RecoveryEventResult" }
        "400":
          description: Malformed event (RECOVERY_BAD_REQUEST)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/admin/config/drafts:
    post:
      operationId: createConfigDraft
      summary: Create a configuration draft (governed lifecycle, V2-CFG-001)
      description: >
        Owner rule: admin manages configuration — no code change for config
        changes. The maker identity comes from the admin credential, never
        the payload. Content is validated by the domain validator before any
        approval can succeed; a value the platform cannot honor is rejected,
        never stored-and-ignored (SF-2).
      security: [{ AdminKeyAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [domain, scope, reason, content]
              properties:
                domain: { type: string, example: product.airtime }
                scope: { type: string, example: "programme:prg_sim_airtime01" }
                reason: { type: string }
                content: { type: object }
      responses:
        "201":
          description: Draft created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ConfigVersion" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422":
          description: Malformed draft (CONFIG_BAD_REQUEST)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /v1/admin/config/{id}/submit:
    post:
      operationId: submitConfigDraft
      summary: Submit a draft for approval
      security: [{ AdminKeyAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/ConfigVersionId" }]
      responses:
        "204": { description: Submitted }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/ConfigNotFound" }

  /v1/admin/config/{id}/approve:
    post:
      operationId: approveConfigVersion
      summary: Approve a submitted version (maker≠checker enforced)
      description: >
        The approver must differ from the maker (409 CONFIG_MAKER_CHECKER,
        V2-CFG-002). The domain validator runs inside the same transaction;
        invalid content is 422 CONFIG_VALIDATION_FAILED.
      security: [{ AdminKeyAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/ConfigVersionId" }]
      responses:
        "204": { description: Approved }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/ConfigNotFound" }
        "409":
          description: Maker cannot approve own change (CONFIG_MAKER_CHECKER)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "422":
          description: Domain validation failed (CONFIG_VALIDATION_FAILED)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /v1/admin/config/{id}/activate:
    post:
      operationId: activateConfigVersion
      summary: Activate an approved version (supersedes the current one atomically)
      security: [{ AdminKeyAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/ConfigVersionId" }]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                effective_from: { type: string, format: date-time }
      responses:
        "204": { description: Activated }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/ConfigNotFound" }
        "422":
          description: Activation validation failed (CONFIG_VALIDATION_FAILED)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /v1/admin/config/active:
    get:
      operationId: getActiveConfig
      summary: Resolve the currently effective version for a domain/scope
      description: Falls back scope → global, so tenants inherit platform defaults.
      security: [{ AdminKeyAuth: [] }]
      parameters:
        - { name: domain, in: query, required: true, schema: { type: string } }
        - { name: scope, in: query, required: true, schema: { type: string } }
      responses:
        "200":
          description: Effective configuration version
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ConfigVersion" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/ConfigNotFound" }

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-Api-Key
      description: >
        Telco/channel credential. Only the SHA-256 of the key is stored
        (V2-SEC-005). The credential — not any payload field — determines the
        tenant context.
    AdminKeyAuth:
      type: apiKey
      in: header
      name: X-Admin-Key
      description: >
        Platform-administrator credential; resolves to the stable actor
        identity used for maker-checker attribution.

  parameters:
    ConfigVersionId:
      name: id
      in: path
      required: true
      schema: { type: string }
      description: config_version_id from draft creation.
    TelcoIdClaim:
      name: X-Telco-Id
      in: header
      required: false
      description: >
        Optional claimed tenant. If present and different from the tenant the
        credential resolves to, the request is rejected 403 and audited
        (TENANT_CONTEXT_MISMATCH).
      schema:
        type: string
        example: MTN_NG
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: >
        Required on all mutating commands (V2-API-002). Scoped to
        (tenant, operation). A retry with the same key returns the original
        outcome; it never repeats the economic effect.
      schema:
        type: string
        minLength: 8
        maxLength: 128
    CorrelationId:
      name: X-Correlation-Id
      in: header
      required: false
      description: >
        BC-6 lineage id. Accepted when 1..64 chars of [A-Za-z0-9_.-];
        otherwise discarded and re-minted (never truncated). Always echoed on
        the response and carried through every command, event, journal and
        audit row this request causes.
      schema:
        type: string
        minLength: 1
        maxLength: 64
        pattern: "^[A-Za-z0-9_.-]+$"

  schemas:
    Money:
      type: object
      description: Integer minor units + ISO 4217 currency (ADR-0002; never floats).
      required: [amount_minor, currency]
      properties:
        amount_minor: { type: integer, format: int64 }
        currency: { type: string, minLength: 3, maxLength: 3, example: NGN }
    Offer:
      type: object
      required: [offer_id, face_value, fee, disbursed, repayment, fee_model, expires_at]
      properties:
        offer_id: { type: string }
        face_value: { $ref: "#/components/schemas/Money" }
        fee: { $ref: "#/components/schemas/Money" }
        disbursed: { $ref: "#/components/schemas/Money" }
        repayment: { $ref: "#/components/schemas/Money" }
        fee_model: { type: string, enum: [DEDUCTED_UPFRONT, ADDED_TO_REPAYMENT] }
        expires_at: { type: string, format: date-time }
    Advance:
      type: object
      description: Customer-safe advance view (V2-ADV-016 — internal ambiguity never exposed).
      required: [advance_id, status, face_value, disbursed, outstanding, status_route]
      properties:
        advance_id: { type: string }
        status:
          type: string
          enum: [PROCESSING, ACTIVE, PARTIALLY_RECOVERED, CLOSED, FAILED]
        face_value: { $ref: "#/components/schemas/Money" }
        disbursed: { $ref: "#/components/schemas/Money" }
        outstanding: { $ref: "#/components/schemas/Money" }
        status_route: { type: string, example: /v1/advances/adv_01J... }
    RecoveryEventResult:
      type: object
      required: [recovery_event_id, state, advance_closed, replayed]
      properties:
        recovery_event_id: { type: string }
        state: { type: string, enum: [ALLOCATED, QUARANTINED, UNMATCHED, PENDING] }
        applied: { $ref: "#/components/schemas/Money" }
        excess: { $ref: "#/components/schemas/Money" }
        advance_closed: { type: boolean }
        replayed: { type: boolean }
    ErrorEnvelope:
      type: object
      required: [error_code, message]
      properties:
        error_code: { type: string }
        message: { type: string }
    LifecycleAck:
      type: object
      required: [config_version_id, step]
      properties:
        config_version_id: { type: string }
        step: { type: string }
    MoneyView:
      type: object
      description: Money as integer minor units plus a server-formatted display string (the UI never computes money — BC-1).
      required: [amount_minor, currency, display]
      properties:
        amount_minor: { type: integer, format: int64 }
        currency: { type: string, example: NGN }
        display: { type: string, example: "NGN 500,000.00" }
    GuardrailTrip:
      type: object
      description: An open treasury guardrail trip (V1-TRE) awaiting two-person re-arm.
      required: [trip_id, telco_id, programme_id, guardrail, measured, limit, state, tripped_at]
      properties:
        trip_id: { type: string }
        telco_id: { type: string }
        programme_id: { type: string }
        guardrail: { type: string, enum: [DAILY_DISBURSED, OPEN_EXPOSURE] }
        measured: { $ref: "#/components/schemas/MoneyView" }
        limit: { $ref: "#/components/schemas/MoneyView" }
        state: { type: string, enum: [TRIPPED, REARM_REQUESTED, REARMED] }
        tripped_at: { type: string, format: date-time }
        rearm_requested_by: { type: string }
        rearm_approved_by: { type: string }
    RearmAck:
      type: object
      required: [trip_id, state]
      properties:
        trip_id: { type: string }
        state: { type: string, enum: [REARM_REQUESTED, REARMED] }
    ConfigSummary:
      type: object
      description: Per-(domain,scope) governance overview row.
      required: [domain, scope, active_version_no, pending_count]
      properties:
        domain: { type: string }
        scope: { type: string }
        active_version_no: { type: integer, description: "0 = nothing active" }
        active_since: { type: string, format: date-time }
        pending_count: { type: integer, description: "DRAFT + SUBMITTED + APPROVED versions" }
    ConfigVersion:
      type: object
      description: Immutable, effective-dated configuration version (V2-CFG-004).
      required: [config_version_id, domain, scope, version_no, state, content, content_hash, created_by, reason]
      properties:
        config_version_id: { type: string }
        domain: { type: string }
        scope: { type: string }
        version_no: { type: integer }
        state:
          type: string
          enum: [DRAFT, SUBMITTED, APPROVED, SCHEDULED, ACTIVE, SUPERSEDED, ROLLED_BACK, REJECTED]
        content: { type: object }
        content_hash: { type: string }
        effective_from: { type: string, format: date-time }
        effective_to: { type: string, format: date-time }
        created_by: { type: string }
        approved_by: { type: string }
        reason: { type: string }
    Programme:
      type: object
      description: Commercial/regulatory arrangement binding legal entity, telco and product set (V1 §5).
      required: [ProgrammeID, TelcoID, Code, Name, Status, CreatedAt]
      properties:
        ProgrammeID:
          type: string
          example: prg_01J2ZK8QF3ANEXAMPLE000000
        TelcoID:
          type: string
          example: MTN_NG
        Code:
          type: string
          example: AIRTIME01
        Name:
          type: string
          example: Airtime Advance
        Status:
          type: string
          enum: [DRAFT, CERTIFICATION, ACTIVE, SUSPENDED, CLOSED]
        CreatedAt:
          type: string
          format: date-time

    Error:
      type: object
      description: Standard error envelope (V2-API-011).
      required: [error_code, message, retryable]
      properties:
        error_code:
          type: string
          description: Stable business error code, family-prefixed.
          example: TENANT_CONTEXT_MISMATCH
        message:
          type: string
          description: Safe human-readable message; never stack traces or secrets.
        retryable:
          type: boolean
        correlation_id:
          type: string

  responses:
    ConfigNotFound:
      description: Config version not found or not in the required lifecycle state (CONFIG_NOT_FOUND).
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Missing, unknown or revoked credential (AUTH_INVALID_CLIENT).
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    TenantMismatch:
      description: Credential tenant conflicts with claimed tenant (TENANT_CONTEXT_MISMATCH); security-audited.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unavailable:
      description: Dependency failure (SYSTEM_TEMPORARILY_UNAVAILABLE).
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

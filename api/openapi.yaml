# Platform API — OpenAPI 3.0 specification (V2-API-001).
# RULE: every endpoint change updates this file IN THE SAME COMMIT; CI validates
# the spec and fails the build on parse/validation errors (api/apispec_test.go).
# Version tracks milestones: 0.<milestone>.<increment>.
openapi: 3.0.3
info:
  title: Telco Digital Credit Platform API
  description: |
    Platform-facing API. Tenant context is resolved from the authenticated
    credential (V2-TEN-002), never from caller-supplied fields; a conflicting
    `X-Telco-Id` claim is rejected 403 and security-audited (V2-TEN-003, EDG-026).

    Conventions (binding, V2-API-002..011):
    - Monetary values are integer **minor units** plus ISO 4217 currency; never floats.
    - Mutating commands require an `Idempotency-Key`; a valid retry returns the
      original outcome (V2-API-003).
    - Timestamps are UTC RFC 3339.
    - Errors use the standard envelope with stable `error_code` families
      (AUTH_*, TENANT_*, OFFER_*, ADVANCE_*, FULFILMENT_*, FUNDING_*, RATE_*, SYSTEM_*).
  version: 0.4.6  # M4d — finance settlement verify (scope-bounded statements + reproducibility)
servers:
  - url: http://localhost:8090
    description: Local development (A-14)

security:
  - ApiKeyAuth: []

paths:
  /v1/portal/login:
    post:
      operationId: portalLogin
      summary: Portal sign-in (M4a) — sets the httpOnly session cookie
      description: >
        Authenticates an operator credential and establishes a server-side
        session: httpOnly SameSite=Strict cookie plus a per-session CSRF
        token the client must echo in X-CSRF-Token on every mutating call.
        Invalid, expired and revoked credentials are indistinguishable.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [api_key]
              properties:
                api_key: { type: string }
      responses:
        "200":
          description: Session established (cookie set)
          content:
            application/json:
              schema:
                type: object
                required: [actor, role, csrf_token, expires_at]
                properties:
                  actor: { type: string }
                  role: { type: string, enum: [ADMIN, RISK, FINANCE, OPS, SUPPORT] }
                  csrf_token: { type: string }
                  expires_at: { type: string, format: date-time }
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
  /v1/portal/logout:
    post:
      operationId: portalLogout
      summary: Revoke the current portal session
      responses:
        "200":
          description: Signed out (cookie cleared, session revoked)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
        "401":
          description: No live session
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
  /v1/portal/me:
    get:
      operationId: portalMe
      summary: Current operator identity + role (all roles)
      responses:
        "200":
          description: Session identity
          content:
            application/json:
              schema:
                type: object
                properties:
                  actor: { type: string }
                  role: { type: string }
                  expires_at: { type: string, format: date-time }
        "401":
          description: No live session
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
  /v1/portal/config/active:
    get:
      operationId: portalConfigActive
      summary: Read the ACTIVE config version (roles ADMIN, RISK, FINANCE)
      parameters:
        - { name: domain, in: query, required: true, schema: { type: string } }
        - { name: scope, in: query, required: true, schema: { type: string } }
      responses:
        "200":
          description: The active version
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ConfigVersion" }
        "403":
          description: Role not permitted (deny-by-default RBAC)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
  /v1/portal/config/overview:
    get:
      operationId: portalConfigOverview
      summary: Per-(domain,scope) governance summary (roles ADMIN, RISK, FINANCE)
      responses:
        "200":
          description: One row per (domain, scope) with active version and pending pipeline count
          content:
            application/json:
              schema:
                type: object
                required: [domains]
                properties:
                  domains:
                    type: array
                    items: { $ref: "#/components/schemas/ConfigSummary" }
        "403":
          description: Role not permitted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
  /v1/portal/config/versions:
    get:
      operationId: portalConfigVersions
      summary: List config versions newest-first (roles ADMIN, RISK, FINANCE)
      parameters:
        - { name: domain, in: query, required: false, schema: { type: string } }
        - { name: scope, in: query, required: false, schema: { type: string } }
        - { name: limit, in: query, required: false, schema: { type: integer, minimum: 1, maximum: 200 } }
      responses:
        "200":
          description: Versions (limit clamped server-side)
          content:
            application/json:
              schema:
                type: object
                required: [versions]
                properties:
                  versions:
                    type: array
                    items: { $ref: "#/components/schemas/ConfigVersion" }
        "403":
          description: Role not permitted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
  /v1/portal/config/{id}:
    get:
      operationId: portalConfigGet
      summary: Read one config version in any lifecycle state (roles ADMIN, RISK, FINANCE)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: The version
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ConfigVersion" }
        "404":
          description: Unknown version id
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
  /v1/portal/config/drafts:
    post:
      operationId: portalConfigDraft
      summary: Create a config draft (role ADMIN; actor = session identity)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [domain, scope, reason, content]
              properties:
                domain: { type: string }
                scope: { type: string }
                reason: { type: string }
                content: { type: object }
      responses:
        "201":
          description: Draft created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ConfigVersion" }
        "403":
          description: Role not permitted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
  /v1/portal/config/{id}/submit:
    post:
      operationId: portalConfigSubmit
      summary: Submit a draft (role ADMIN)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Submitted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LifecycleAck" }
  /v1/portal/config/{id}/approve:
    post:
      operationId: portalConfigApprove
      summary: Approve a submission (role ADMIN; maker-checker enforced server-side)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Approved
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LifecycleAck" }
        "409":
          description: Maker-checker violation (approver == maker)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
  /v1/portal/config/{id}/activate:
    post:
      operationId: portalConfigActivate
      summary: Activate an approved version (role ADMIN)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Activated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LifecycleAck" }
  /v1/portal/risk/trips:
    get:
      operationId: portalRiskTrips
      summary: List open guardrail trips in the operator's scope (roles ADMIN, RISK, FINANCE)
      description: >
        Trips still holding a programme (state != REARMED), bounded to the
        operator's telco/programme scope. A platform admin ('*') sees all; a
        'global'-only operator sees none.
      responses:
        "200":
          description: Open trips
          content:
            application/json:
              schema:
                type: object
                required: [trips]
                properties:
                  trips:
                    type: array
                    items: { $ref: "#/components/schemas/GuardrailTrip" }
        "403":
          description: Role not permitted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
  /v1/portal/risk/trips/{id}/request-rearm:
    post:
      operationId: portalRiskRequestRearm
      summary: Request re-arm of a tripped guardrail (maker step; roles ADMIN, RISK)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason: { type: string }
      responses:
        "200":
          description: Re-arm requested
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RearmAck" }
        "404":
          description: Trip not found, out of scope, or not in the required state (no oracle)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
  /v1/portal/risk/trips/{id}/approve-rearm:
    post:
      operationId: portalRiskApproveRearm
      summary: Approve a re-arm (checker step, distinct actor schema-enforced; roles ADMIN, RISK)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Re-armed; programme resumes when no other guardrail holds it
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RearmAck" }
        "409":
          description: Two-person violation (approver == requester)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "404":
          description: Trip not found, out of scope, or not in the required state (no oracle)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
  /v1/portal/finance/ledger/journals:
    get:
      operationId: portalLedgerJournals
      summary: Browse ledger journals in the operator's scope (roles ADMIN, FINANCE)
      description: >
        Journals newest-first, bounded to the operator's telco/programme scope.
        Filter by advance_id or correlation_id (the latter is the BC-6 lineage
        of one business action across its journals).
      parameters:
        - { name: advance_id, in: query, required: false, schema: { type: string } }
        - { name: correlation_id, in: query, required: false, schema: { type: string } }
        - { name: limit, in: query, required: false, schema: { type: integer, minimum: 1, maximum: 500 } }
      responses:
        "200":
          description: Journals
          content:
            application/json:
              schema:
                type: object
                required: [journals]
                properties:
                  journals:
                    type: array
                    items: { $ref: "#/components/schemas/JournalHeader" }
        "403":
          description: Role not permitted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
  /v1/portal/finance/ledger/journals/{id}:
    get:
      operationId: portalLedgerJournal
      summary: One journal with its balanced entries (tap-to-journal; roles ADMIN, FINANCE)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Journal header + entries
          content:
            application/json:
              schema:
                type: object
                required: [journal, entries]
                properties:
                  journal: { $ref: "#/components/schemas/JournalHeader" }
                  entries:
                    type: array
                    items: { $ref: "#/components/schemas/JournalEntry" }
        "404":
          description: Journal not found or out of scope (no oracle)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
  /v1/portal/finance/breaks:
    get:
      operationId: portalFinanceBreaks
      summary: Open reconciliation breaks in the operator's telco scope (roles ADMIN, FINANCE)
      description: >
        Unresolved recon breaks. Telco-grained: a '*' admin sees all, a
        telco-scoped operator sees their telco; a programme- or global-scoped
        operator has no telco-level authority and sees none.
      responses:
        "200":
          description: Open breaks
          content:
            application/json:
              schema:
                type: object
                required: [breaks]
                properties:
                  breaks:
                    type: array
                    items: { $ref: "#/components/schemas/ReconBreak" }
        "403":
          description: Role not permitted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
  /v1/portal/finance/breaks/{id}/action:
    post:
      operationId: portalFinanceBreakAction
      summary: Act on a reconciliation break (ASSIGN/RESOLVE/ESCALATE/NOTE; roles ADMIN, FINANCE)
      description: >
        Reason is required; the actor is the session identity. A break is never
        edited away — RESOLVE stamps a reason, and every action is append-only
        logged and audited.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action, reason]
              properties:
                action: { type: string, enum: [ASSIGN, RESOLVE, ESCALATE, NOTE] }
                reason: { type: string }
      responses:
        "200":
          description: Action applied
          content:
            application/json:
              schema:
                type: object
                properties:
                  recon_item_id: { type: string }
                  action: { type: string }
        "404":
          description: Break not found, out of scope, or already resolved (no oracle)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
  /v1/portal/finance/settlements:
    get:
      operationId: portalFinanceSettlements
      summary: List settlement statements in the operator's scope (roles ADMIN, FINANCE)
      responses:
        "200":
          description: Statements
          content:
            application/json:
              schema:
                type: object
                required: [statements]
                properties:
                  statements:
                    type: array
                    items: { $ref: "#/components/schemas/SettlementStatement" }
        "403":
          description: Role not permitted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
  /v1/portal/finance/settlements/{id}:
    get:
      operationId: portalFinanceSettlement
      summary: One settlement statement with its lines (roles ADMIN, FINANCE)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Statement + lines
          content:
            application/json:
              schema:
                type: object
                required: [statement, lines]
                properties:
                  statement: { $ref: "#/components/schemas/SettlementStatement" }
                  lines:
                    type: array
                    items:
                      type: object
                      properties:
                        line_code: { type: string }
                        amount: { $ref: "#/components/schemas/MoneyView" }
        "404":
          description: Statement not found or out of scope (no oracle)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
  /v1/portal/finance/settlements/{id}/verify:
    post:
      operationId: portalFinanceSettlementVerify
      summary: Recompute a FINAL statement and report whether it reproduces (roles ADMIN, FINANCE)
      description: >
        Re-derives the statement's lines from the ledger with the PINNED terms
        version and compares the content hash. A mismatch is a data-integrity
        finding, reported as verified=false (a result, not an error).
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema:
                type: object
                required: [statement_id, verified]
                properties:
                  statement_id: { type: string }
                  verified: { type: boolean }
        "409":
          description: Statement is not FINAL (nothing to verify)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "404":
          description: Statement not found or out of scope (no oracle)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
  /v1/portal/ops/fulfilments:
    get:
      operationId: portalOpsFulfilments
      summary: Ambiguous fulfilment attempts — UNKNOWN plus stale-SENT (roles ADMIN, OPS, FINANCE)
      description: >
        Attempts whose telco outcome is unresolved, oldest first, joined to
        their advance for exposure context. The SENT-staleness threshold is
        governed config (ops.queues); absent or invalid config refuses the
        read rather than listing an unbounded or empty queue. Reads are
        bounded by the operator's scope in SQL.
      parameters:
        - { name: limit, in: query, required: false, schema: { type: integer, minimum: 1 } }
      responses:
        "200":
          description: Ambiguity queue
          content:
            application/json:
              schema:
                type: object
                required: [attempts, stale_sent_after_seconds]
                properties:
                  stale_sent_after_seconds: { type: integer }
                  attempts:
                    type: array
                    items:
                      type: object
                      required: [attempt_id, advance_id, telco_id, programme_id, state]
                      properties:
                        attempt_id: { type: string }
                        advance_id: { type: string }
                        telco_id: { type: string }
                        programme_id: { type: string }
                        advance_state: { type: string }
                        face_value: { $ref: "#/components/schemas/MoneyView" }
                        state: { type: string, enum: [UNKNOWN, SENT] }
                        attempt_no: { type: integer }
                        enquiry_count: { type: integer }
                        submitted_at: { type: string }
                        next_enquiry_at: { type: string }
        "500":
          description: ops.queues config missing or invalid (zero-config floor)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
  /v1/portal/ops/fulfilments/{id}/enquire-now:
    post:
      operationId: portalOpsEnquireNow
      summary: Reschedule one ambiguous attempt for immediate resolver enquiry (roles ADMIN, OPS)
      description: >
        Pulls the attempt to the front of the resolver's enquiry queue. The
        portal never talks to the telco and never resolves attempt state —
        an attempt the resolver settled in the meantime returns 409.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Rescheduled
          content:
            application/json:
              schema:
                type: object
                required: [attempt_id, rescheduled]
                properties:
                  attempt_id: { type: string }
                  rescheduled: { type: boolean }
        "404":
          description: Attempt not found, out of scope, or not ambiguous (no oracle)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "409":
          description: Attempt resolved between read and action
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
  /v1/portal/ops/reversals:
    get:
      operationId: portalOpsReversals
      summary: PARKED reversals with their current blocker (roles ADMIN, OPS, FINANCE)
      description: >
        The M3B-F1 operator queue - reversals waiting on their original event
        or blocked by an invariant collision, oldest first, each carrying its
        park_reason. Telco-grained resource - reads take the telco-level
        scope bound (a programme-scoped operator sees an empty queue).
      parameters:
        - { name: limit, in: query, required: false, schema: { type: integer, minimum: 1 } }
      responses:
        "200":
          description: Parked reversal queue
          content:
            application/json:
              schema:
                type: object
                required: [reversals]
                properties:
                  reversals:
                    type: array
                    items:
                      type: object
                      required: [pending_reversal_id, telco_id, park_reason]
                      properties:
                        pending_reversal_id: { type: string }
                        telco_id: { type: string }
                        original_source_event_id: { type: string }
                        reversal_source_event_id: { type: string }
                        amount: { $ref: "#/components/schemas/MoneyView" }
                        park_reason: { type: string }
                        received_at: { type: string }
  /v1/portal/ops/reversals/{id}/retry:
    post:
      operationId: portalOpsReversalRetry
      summary: Re-attempt one parked reversal through the guarded apply (roles ADMIN, OPS)
      description: >
        Re-runs the money core's own guarded reversal apply - never a second
        reversal path. Applied drains the queue; still blocked refreshes and
        returns the park_reason; a reversal the ingest path applied
        concurrently returns 409 (row-lock claim, no double-apply).
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Retry outcome
          content:
            application/json:
              schema:
                type: object
                required: [pending_reversal_id, applied]
                properties:
                  pending_reversal_id: { type: string }
                  applied: { type: boolean }
                  park_reason: { type: string }
        "404":
          description: Parked reversal not found or out of scope (no oracle)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "409":
          description: Reversal no longer parked (applied concurrently)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
  /v1/portal/ops/status-actions:
    get:
      operationId: portalOpsStatusActions
      summary: Subscriber status actions, newest first (roles ADMIN, OPS, RISK, FINANCE)
      description: >
        The maker-checker record behind every operator change of a
        subscriber's status (VR-35-F1). Telco-grained - reads take the
        telco-level scope bound. SELF_EXCLUDED never appears - it is
        structurally excluded from operator actions (customer channel only).
      responses:
        "200":
          description: Status action list
          content:
            application/json:
              schema:
                type: object
                required: [actions]
                properties:
                  actions:
                    type: array
                    items:
                      $ref: "#/components/schemas/StatusAction"
    post:
      operationId: portalOpsStatusActionRequest
      summary: Request a subscriber status change (maker step; roles ADMIN, OPS, RISK)
      description: >
        Records the intended transition against the subscriber's CURRENT
        status. The transition must be in the governed ops.status_actions set
        (absent config refuses everything); one open action per subscriber; a
        DISTINCT second actor must approve before anything is applied.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [msisdn_token, to_status, reason]
              properties:
                telco_id: { type: string, description: Required only for all-scope (*) sessions }
                msisdn_token: { type: string }
                to_status: { type: string, enum: [ACTIVE, BARRED, CLOSED] }
                reason: { type: string }
      responses:
        "200":
          description: Action opened
          content:
            application/json:
              schema:
                type: object
                required: [action_id, state]
                properties:
                  action_id: { type: string }
                  state: { type: string, enum: [REQUESTED] }
                  from_status: { type: string }
                  to_status: { type: string }
        "400":
          description: Transition not in the governed set, or bad request
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "404":
          description: Subscriber not found in scope (no oracle)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "409":
          description: Subscriber already has an open status action
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
  /v1/portal/ops/status-actions/{id}/approve:
    post:
      operationId: portalOpsStatusActionApprove
      summary: Approve and apply a status action (checker step; roles ADMIN, OPS, RISK)
      description: >
        A DISTINCT second actor applies the transition via compare-and-set on
        the recorded from_status - a subscriber whose status drifted since the
        request refuses with 409, never overwrites blind. The governed
        transition set is re-checked at decision time.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Applied
          content:
            application/json:
              schema:
                type: object
                required: [action_id, state]
                properties:
                  action_id: { type: string }
                  state: { type: string, enum: [APPLIED] }
        "404":
          description: Action not found, out of scope, or not open (no oracle)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "409":
          description: Same-actor approval, or subscriber status drifted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
  /v1/portal/ops/status-actions/{id}/reject:
    post:
      operationId: portalOpsStatusActionReject
      summary: Reject a status action (checker step; roles ADMIN, OPS, RISK)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Rejected
          content:
            application/json:
              schema:
                type: object
                required: [action_id, state]
                properties:
                  action_id: { type: string }
                  state: { type: string, enum: [REJECTED] }
        "404":
          description: Action not found, out of scope, or not open (no oracle)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "409":
          description: Same-actor decision refused
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
  /healthz:
    get:
      operationId: getHealth
      summary: Liveness/readiness probe (V2-SRV-008)
      security: []  # unauthenticated by design
      responses:
        "200":
          description: Service healthy
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    enum: [ok]
        "503":
          $ref: "#/components/responses/Unavailable"

  /v1/programmes:
    get:
      operationId: listProgrammes
      summary: List the authenticated tenant's programmes
      description: >
        Tenant-scoped via RLS: returns only rows belonging to the telco the
        credential resolves to. Missing tenant context returns nothing, never
        all tenants (fail closed).
      parameters:
        - $ref: "#/components/parameters/TelcoIdClaim"
      responses:
        "200":
          description: Programmes for the authenticated tenant
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Programme"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/TenantMismatch"
        "500":
          $ref: "#/components/responses/Unavailable"

  /v1/offers:
    get:
      operationId: listOffers
      summary: Current valid offers for a subscriber (V2-OFR-009 reuse)
      description: >
        Every value derives from governed product config + the pinned decision
        snapshot. Generation is serialized per subscriber/programme — repeated
        or concurrent enquiries return the same ladder.
      parameters:
        - { name: programme_id, in: query, required: true, schema: { type: string } }
        - { name: msisdn_token, in: query, required: true, schema: { type: string } }
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: Offer ladder (may be empty when nothing is offerable)
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Offer" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404":
          description: Unknown subscriber token (OFFER_NOT_FOUND)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /v1/advances:
    post:
      operationId: confirmAdvance
      summary: Confirm an offer — the origination saga (V2 §13)
      description: >
        Requires Idempotency-Key (V2-API-002): a retry with the same key
        returns the ORIGINAL outcome (200), never a second advance. 201 =
        credited (ACTIVE). 202 = PROCESSING — the outcome is being resolved
        (never blind-retried); poll status_route (EDG-004/005). 422 = telco
        definitively rejected. Customer-safe statuses only (V2-ADV-016).
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [programme_id, offer_id, msisdn_token]
              properties:
                programme_id: { type: string }
                offer_id: { type: string }
                msisdn_token: { type: string }
      responses:
        "201":
          description: Advance ACTIVE — value credited
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Advance" }
        "200":
          description: Idempotent replay of the original outcome (EDG-001)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Advance" }
        "202":
          description: PROCESSING — resolution in progress, poll status_route
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Advance" }
        "400":
          description: Missing/invalid Idempotency-Key or malformed body
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403":
          description: Subscriber not eligible (SUBSCRIBER_INACTIVE)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          description: Offer not found (OFFER_NOT_FOUND)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "409":
          description: >
            OFFER_EXPIRED | OFFER_SNAPSHOT_MISMATCH |
            CONCURRENT_ADVANCE_BLOCK | FUNDING_POOL_EXHAUSTED
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "422":
          description: Telco definitively rejected fulfilment (status FAILED)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Advance" }

  /v1/advances/{id}:
    get:
      operationId: getAdvanceStatus
      summary: Durable advance status (EDG-004 — survives dropped sessions)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: Customer-safe advance status
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Advance" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404":
          description: Unknown advance (ADVANCE_NOT_FOUND; tenant-scoped visibility)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /v1/recovery/events:
    post:
      operationId: ingestRecoveryEvent
      summary: Canonical recharge-recovery event (V2-COL-001, EDG-018/020)
      description: >
        Idempotent by source_event_id — a telco replay returns the original
        outcome and changes nothing. Allocation follows the governed waterfall;
        over-recovery quarantines to suspense as an explicit liability;
        unmatched tokens are preserved, never discarded.
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [source_event_id, msisdn_token, amount, occurred_at]
              properties:
                source_event_id: { type: string }
                msisdn_token: { type: string }
                amount: { $ref: "#/components/schemas/Money" }
                occurred_at: { type: string, format: date-time }
      responses:
        "200":
          description: Event outcome (allocated / quarantined / unmatched / replayed)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RecoveryEventResult" }
        "400":
          description: Malformed event (RECOVERY_BAD_REQUEST)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401": { $ref: "#/components/responses/Unauthorized" }
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-Api-Key
      description: >
        Telco/channel credential. Only the SHA-256 of the key is stored
        (V2-SEC-005). The credential — not any payload field — determines the
        tenant context.
    # AdminKeyAuth (X-Admin-Key) removed in EXT-1 — the header-authenticated
    # admin config API it secured was a role-unaware bypass of the portal's
    # RBAC + scope model. Operator auth is the session cookie only.

  parameters:
    TelcoIdClaim:
      name: X-Telco-Id
      in: header
      required: false
      description: >
        Optional claimed tenant. If present and different from the tenant the
        credential resolves to, the request is rejected 403 and audited
        (TENANT_CONTEXT_MISMATCH).
      schema:
        type: string
        example: MTN_NG
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: >
        Required on all mutating commands (V2-API-002). Scoped to
        (tenant, operation). A retry with the same key returns the original
        outcome; it never repeats the economic effect.
      schema:
        type: string
        minLength: 8
        maxLength: 128
    CorrelationId:
      name: X-Correlation-Id
      in: header
      required: false
      description: >
        BC-6 lineage id. Accepted when 1..64 chars of [A-Za-z0-9_.-];
        otherwise discarded and re-minted (never truncated). Always echoed on
        the response and carried through every command, event, journal and
        audit row this request causes.
      schema:
        type: string
        minLength: 1
        maxLength: 64
        pattern: "^[A-Za-z0-9_.-]+$"

  schemas:
    Money:
      type: object
      description: Integer minor units + ISO 4217 currency (ADR-0002; never floats).
      required: [amount_minor, currency]
      properties:
        amount_minor: { type: integer, format: int64 }
        currency: { type: string, minLength: 3, maxLength: 3, example: NGN }
    Offer:
      type: object
      required: [offer_id, face_value, fee, disbursed, repayment, fee_model, expires_at]
      properties:
        offer_id: { type: string }
        face_value: { $ref: "#/components/schemas/Money" }
        fee: { $ref: "#/components/schemas/Money" }
        disbursed: { $ref: "#/components/schemas/Money" }
        repayment: { $ref: "#/components/schemas/Money" }
        fee_model: { type: string, enum: [DEDUCTED_UPFRONT, ADDED_TO_REPAYMENT] }
        expires_at: { type: string, format: date-time }
    Advance:
      type: object
      description: Customer-safe advance view (V2-ADV-016 — internal ambiguity never exposed).
      required: [advance_id, status, face_value, disbursed, outstanding, status_route]
      properties:
        advance_id: { type: string }
        status:
          type: string
          enum: [PROCESSING, ACTIVE, PARTIALLY_RECOVERED, CLOSED, FAILED]
        face_value: { $ref: "#/components/schemas/Money" }
        disbursed: { $ref: "#/components/schemas/Money" }
        outstanding: { $ref: "#/components/schemas/Money" }
        status_route: { type: string, example: /v1/advances/adv_01J... }
    RecoveryEventResult:
      type: object
      required: [recovery_event_id, state, advance_closed, replayed]
      properties:
        recovery_event_id: { type: string }
        state: { type: string, enum: [ALLOCATED, QUARANTINED, UNMATCHED, PENDING] }
        applied: { $ref: "#/components/schemas/Money" }
        excess: { $ref: "#/components/schemas/Money" }
        advance_closed: { type: boolean }
        replayed: { type: boolean }
    ErrorEnvelope:
      type: object
      required: [error_code, message]
      properties:
        error_code: { type: string }
        message: { type: string }
    LifecycleAck:
      type: object
      required: [config_version_id, step]
      properties:
        config_version_id: { type: string }
        step: { type: string }
    MoneyView:
      type: object
      description: Money as integer minor units plus a server-formatted display string (the UI never computes money — BC-1).
      required: [amount_minor, currency, display]
      properties:
        amount_minor: { type: integer, format: int64 }
        currency: { type: string, example: NGN }
        display: { type: string, example: "NGN 500,000.00" }
    StatusAction:
      type: object
      description: One maker-checker subscriber-status action (M4e-2, VR-35-F1). SELF_EXCLUDED never appears here — it is structurally excluded from operator actions.
      required: [action_id, telco_id, subscriber_account_id, from_status, to_status, state, requested_by, requested_at]
      properties:
        action_id: { type: string }
        telco_id: { type: string }
        subscriber_account_id: { type: string }
        msisdn_token: { type: string }
        current_status: { type: string }
        from_status: { type: string, enum: [ACTIVE, BARRED, CLOSED] }
        to_status: { type: string, enum: [ACTIVE, BARRED, CLOSED] }
        reason: { type: string }
        requested_by: { type: string }
        approved_by: { type: string }
        state: { type: string, enum: [REQUESTED, REJECTED, APPLIED] }
        requested_at: { type: string }
        decided_at: { type: string }
    SettlementStatement:
      type: object
      description: A settlement statement (ledger-derived; V1-SET / CFG-012).
      required: [statement_id, telco_id, programme_id, period_start, period_end, state, currency, terms_version_id]
      properties:
        statement_id: { type: string }
        telco_id: { type: string }
        programme_id: { type: string }
        period_start: { type: string, format: date-time }
        period_end: { type: string, format: date-time }
        state: { type: string, enum: [DRAFT, FINAL] }
        currency: { type: string }
        terms_version_id: { type: string }
        finalised_at: { type: string, format: date-time }
    ReconBreak:
      type: object
      description: An unresolved reconciliation break (V2-REC).
      required: [recon_item_id, run_id, telco_id, item_type, status, created_at]
      properties:
        recon_item_id: { type: string }
        run_id: { type: string }
        telco_id: { type: string }
        item_type: { type: string, enum: [FULFILMENT, RECOVERY] }
        status: { type: string, enum: [BREAK_MISSING_PLATFORM, BREAK_MISSING_TELCO, BREAK_AMOUNT_MISMATCH] }
        platform_ref: { type: string }
        telco_ref: { type: string }
        assigned_to: { type: string }
        created_at: { type: string, format: date-time }
    JournalHeader:
      type: object
      description: A ledger journal header (BC-6 correlation lineage; V2-LED).
      required: [journal_id, event_type, telco_id, programme_id, correlation_id, accounting_date, posted_at]
      properties:
        journal_id: { type: string }
        event_type: { type: string }
        telco_id: { type: string }
        programme_id: { type: string }
        advance_id: { type: string }
        correlation_id: { type: string }
        accounting_date: { type: string, example: "2026-07-18" }
        posted_at: { type: string, format: date-time }
    JournalEntry:
      type: object
      description: One ledger entry (exactly one of debit/credit is non-zero).
      required: [entry_id, account_code, debit, credit]
      properties:
        entry_id: { type: string }
        account_code: { type: string }
        debit: { $ref: "#/components/schemas/MoneyView" }
        credit: { $ref: "#/components/schemas/MoneyView" }
    GuardrailTrip:
      type: object
      description: An open treasury guardrail trip (V1-TRE) awaiting two-person re-arm.
      required: [trip_id, telco_id, programme_id, guardrail, measured, limit, state, tripped_at]
      properties:
        trip_id: { type: string }
        telco_id: { type: string }
        programme_id: { type: string }
        guardrail: { type: string, enum: [DAILY_DISBURSED, OPEN_EXPOSURE] }
        measured: { $ref: "#/components/schemas/MoneyView" }
        limit: { $ref: "#/components/schemas/MoneyView" }
        state: { type: string, enum: [TRIPPED, REARM_REQUESTED, REARMED] }
        tripped_at: { type: string, format: date-time }
        rearm_requested_by: { type: string }
        rearm_approved_by: { type: string }
    RearmAck:
      type: object
      required: [trip_id, state]
      properties:
        trip_id: { type: string }
        state: { type: string, enum: [REARM_REQUESTED, REARMED] }
    ConfigSummary:
      type: object
      description: Per-(domain,scope) governance overview row.
      required: [domain, scope, active_version_no, pending_count]
      properties:
        domain: { type: string }
        scope: { type: string }
        active_version_no: { type: integer, description: "0 = nothing active" }
        active_since: { type: string, format: date-time }
        pending_count: { type: integer, description: "DRAFT + SUBMITTED + APPROVED versions" }
    ConfigVersion:
      type: object
      description: Immutable, effective-dated configuration version (V2-CFG-004).
      required: [config_version_id, domain, scope, version_no, state, content, content_hash, created_by, reason]
      properties:
        config_version_id: { type: string }
        domain: { type: string }
        scope: { type: string }
        version_no: { type: integer }
        state:
          type: string
          enum: [DRAFT, SUBMITTED, APPROVED, SCHEDULED, ACTIVE, SUPERSEDED, ROLLED_BACK, REJECTED]
        content: { type: object }
        content_hash: { type: string }
        effective_from: { type: string, format: date-time }
        effective_to: { type: string, format: date-time }
        created_by: { type: string }
        approved_by: { type: string }
        reason: { type: string }
    Programme:
      type: object
      description: Commercial/regulatory arrangement binding legal entity, telco and product set (V1 §5).
      required: [ProgrammeID, TelcoID, Code, Name, Status, CreatedAt]
      properties:
        ProgrammeID:
          type: string
          example: prg_01J2ZK8QF3ANEXAMPLE000000
        TelcoID:
          type: string
          example: MTN_NG
        Code:
          type: string
          example: AIRTIME01
        Name:
          type: string
          example: Airtime Advance
        Status:
          type: string
          enum: [DRAFT, CERTIFICATION, ACTIVE, SUSPENDED, CLOSED]
        CreatedAt:
          type: string
          format: date-time

    Error:
      type: object
      description: Standard error envelope (V2-API-011).
      required: [error_code, message, retryable]
      properties:
        error_code:
          type: string
          description: Stable business error code, family-prefixed.
          example: TENANT_CONTEXT_MISMATCH
        message:
          type: string
          description: Safe human-readable message; never stack traces or secrets.
        retryable:
          type: boolean
        correlation_id:
          type: string

  responses:
    Unauthorized:
      description: Missing, unknown or revoked credential (AUTH_INVALID_CLIENT).
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    TenantMismatch:
      description: Credential tenant conflicts with claimed tenant (TENANT_CONTEXT_MISMATCH); security-audited.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unavailable:
      description: Dependency failure (SYSTEM_TEMPORARILY_UNAVAILABLE).
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

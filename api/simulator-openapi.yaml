# Telco Simulator — canonical telco contract (V2-SIM-001/007, ADR-0001).
# This spec doubles as the CANONICAL FULFILMENT CONTRACT (V2 §5.2): real telco
# adapters translate operator-specific APIs into exactly this shape, so the
# simulator and production adapters are certified against the same schema
# (V2-SIM-012).
openapi: 3.0.3
info:
  title: Telco Simulator API (canonical telco contracts)
  description: |
    Standing simulator implementing the canonical telco-side operations before
    live telco connectivity exists. Deterministic: outcomes derive from a
    stable hash of (seed, platform_request_id), so any failure is reproducible
    (V2-SIM-006). The fault catalogue (timeout-after-success, duplicate
    callbacks, out-of-order reversals) arrives with M1.
  version: 0.3.0  # M2e — canonical SMS submission + sms evidence log
servers:
  - url: http://localhost:8091
    description: Local development

paths:
  /healthz:
    get:
      operationId: getHealth
      summary: Liveness probe
      responses:
        "200":
          description: Simulator healthy
          content:
            application/json:
              schema:
                type: object
                required: [status, seed]
                properties:
                  status: { type: string, enum: [ok] }
                  seed: { type: string }

  /v1/telcos/{telcoId}/fulfilments:
    post:
      operationId: submitFulfilment
      summary: Submit an airtime/data fulfilment instruction (canonical contract, V2 §5.2)
      description: |
        NO BLIND RETRY: a timeout on this call is NOT a confirmed failure — the
        platform must move the advance to FULFILMENT_UNKNOWN and resolve via
        status enquiry or reconciliation before any repeat instruction (INV-009).
        Duplicate submissions with the same Idempotency-Key return the original
        outcome (V2-TEL-003).
      parameters:
        - name: telcoId
          in: path
          required: true
          schema: { type: string }
          example: SIM_NG
        - name: Idempotency-Key
          in: header
          required: true
          schema: { type: string, minLength: 8, maxLength: 128 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FulfilmentRequest"
      responses:
        "200":
          description: Outcome (or replayed original outcome for a duplicate key)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FulfilmentResponse"
        "400":
          description: Missing Idempotency-Key or malformed request
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: string }

  /v1/telcos/{telcoId}/fulfilments/{platformRequestId}:
    get:
      operationId: enquireFulfilmentStatus
      summary: Status enquiry — THE ambiguity resolver (V2-TEL-011, INV-009)
      description: >
        Read-only and safe to repeat. A platform that received a timeout on
        submission calls this instead of resubmitting. 404 means the
        instruction provably never landed (safe to mark failed); 200 returns
        the definitive outcome including timeout-after-success cases.
      parameters:
        - { name: telcoId, in: path, required: true, schema: { type: string } }
        - { name: platformRequestId, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Definitive outcome for the fulfilment
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FulfilmentResponse" }
        "404":
          description: No record of this platform_request_id — never landed
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: string }

  /v1/telcos/{telcoId}/feature-file:
    get:
      operationId: getFeatureFile
      summary: Canonical batch feature file (V2-SCR-001/002)
      description: >
        The telco's daily data cut for feature computation. DETERMINISTIC in
        (seed, count, as_of date) — refetching the same day's file yields
        byte-identical content, so platform-side file dedup engages. Row
        profiles are index-derived (every 13th row spiky, every 7th thin-file)
        so certification tests select scenarios by row position. All
        quantities are integers (minor units / day counts) — no floats.
      parameters:
        - { name: telcoId, in: path, required: true, schema: { type: string } }
        - { name: count, in: query, required: false, schema: { type: integer, minimum: 1, maximum: 2000000, default: 100 } }
        - { name: as_of, in: query, required: false, schema: { type: string, format: date }, description: "Data cut date (default: today UTC)" }
        - { name: malformed, in: query, required: false, schema: { type: string, enum: ["1"] }, description: "Append one contract-violating row (negative amount) to exercise quarantine paths" }
      responses:
        "200":
          description: The feature file
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FeatureFile" }
        "400":
          description: Bad count or as_of
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: string }

  /v1/telcos/{telcoId}/sms:
    post:
      operationId: sendSMS
      summary: Submit a subscriber SMS (canonical notification contract, V2 §10.2)
      description: >
        Idempotent per Idempotency-Key like fulfilment — a notifier retry can
        never double-send. The simulator records every accepted message as
        evidence, retrievable via /sim/sms.
      parameters:
        - { name: telcoId, in: path, required: true, schema: { type: string } }
        - { name: Idempotency-Key, in: header, required: true, schema: { type: string, minLength: 8, maxLength: 128 } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [msisdn_token, sender_id, body]
              properties:
                msisdn_token: { type: string }
                sender_id: { type: string }
                body: { type: string }
      responses:
        "200":
          description: Accepted (or replayed) — provider reference returned
          content:
            application/json:
              schema:
                type: object
                required: [provider_ref]
                properties:
                  provider_ref: { type: string }
        "400":
          description: Missing Idempotency-Key or malformed request
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: string }

  /sim/sms:
    get:
      operationId: listSimSMS
      summary: Telco-side SMS evidence log
      responses:
        "200":
          description: All accepted messages in arrival order
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required: [provider_ref, msisdn_token, sender_id, body, received_at]
                  properties:
                    provider_ref: { type: string }
                    msisdn_token: { type: string }
                    sender_id: { type: string }
                    body: { type: string }
                    received_at: { type: string, format: date-time }

  /sim/transactions:
    get:
      operationId: listSimTransactions
      summary: Telco-side transaction records (reconciliation source, V2-REC-001)
      description: >
        The simulator's authoritative record of what it credited — the file
        the platform's daily reconciliation compares against (M1). Ordered by
        credited_at ascending.
      responses:
        "200":
          description: All telco-side transactions
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Transaction" }

components:
  schemas:
    FeatureFile:
      type: object
      required: [telco_id, as_of, rows]
      properties:
        telco_id: { type: string }
        as_of: { type: string, format: date-time }
        rows:
          type: array
          items: { $ref: "#/components/schemas/FeatureRow" }
    FeatureRow:
      type: object
      required: [msisdn_token, tenure_days, activity_days_30d, active_days_90d, weekly_recharge_minor, currency]
      properties:
        msisdn_token: { type: string }
        tenure_days: { type: integer, minimum: 0 }
        activity_days_30d: { type: integer, minimum: 0, maximum: 30 }
        active_days_90d: { type: integer, minimum: 0, maximum: 90 }
        weekly_recharge_minor:
          type: array
          description: 13 weekly recharge totals in minor units, most recent week first.
          items: { type: integer, format: int64, minimum: 0 }
          minItems: 13
          maxItems: 13
        currency: { type: string, minLength: 3, maxLength: 3 }
        quality_flags:
          type: array
          items: { type: string }
          description: Data-quality markers (e.g. SHORT_HISTORY) — read, never guessed (V2-SCR-002).
    Transaction:
      type: object
      required: [platform_request_id, telco_transaction_reference, msisdn_token, face_value_minor, currency, status, credited_at]
      properties:
        platform_request_id: { type: string }
        telco_transaction_reference: { type: string }
        msisdn_token: { type: string }
        face_value_minor: { type: integer, format: int64 }
        currency: { type: string }
        status: { type: string, enum: [SUCCESS, FAILED] }
        credited_at: { type: string, format: date-time }
    FulfilmentRequest:
      type: object
      required:
        - platform_request_id
        - subscriber_account_id
        - msisdn_token
        - product_type
        - face_value_minor
        - currency
        - offer_snapshot_id
      properties:
        platform_request_id:
          type: string
          description: Platform correlation ID; pairs with the telco transaction reference (V2-ADV-005).
          example: ADVREQ-01J2ZK8QF3ANEXAMPLE000000
        subscriber_account_id:
          type: string
          example: SUB-01J2ZK8QF3ANEXAMPLE000000
        msisdn_token:
          type: string
          description: Tokenised MSISDN — raw numbers never cross this boundary (V2-API-007).
        product_type:
          type: string
          enum: [AIRTIME_ADVANCE, DATA_ADVANCE]
        face_value_minor:
          type: integer
          format: int64
          minimum: 1
          description: Integer minor units (kobo); never floats (V2-API-005).
          example: 10000
        currency:
          type: string
          minLength: 3
          maxLength: 3
          example: NGN
        offer_snapshot_id:
          type: string
        callback_url:
          type: string
          format: uri
          description: Where asynchronous fulfilment callbacks are delivered (M1+).
    FulfilmentResponse:
      type: object
      required: [telco_transaction_reference, status]
      properties:
        telco_transaction_reference:
          type: string
          example: SIM-8f3a2c01
        status:
          type: string
          enum: [SUCCESS, PENDING, FAILED]
